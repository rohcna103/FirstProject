<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Workout Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .calendar-day { min-height: 100px; transition: all 0.2s; }
        .calendar-day:hover { background-color: #f1f5f9; }
    </style>
</head>
<body class="text-slate-800">

    <!-- Login Overlay -->
    <div id="login-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 bg-opacity-80">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md mx-4">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 text-blue-600 rounded-full mb-4">
                    <i class="fa-solid fa-lock text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold">Workout Tracker Login</h1>
                <p class="text-slate-500 mt-2">운동 기록을 확인하려면 로그인하세요.</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">아이디</label>
                    <input type="text" id="username" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="user">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">비밀번호</label>
                    <input type="password" id="password" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="password">
                </div>
                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition shadow-lg">
                    로그인
                </button>
                <p id="login-error" class="text-red-500 text-sm text-center hidden">아이디 또는 비밀번호가 틀렸습니다.</p>
            </div>
        </div>
    </div>

    <!-- Main Content (Hidden by default) -->
    <div id="main-content" class="hidden min-h-screen pb-12">
        <nav class="glass sticky top-0 border-b border-slate-200 z-10 px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-600 flex items-center gap-2">
                <i class="fa-solid fa-dumbbell"></i> My Workout Log
            </h1>
            <button onclick="handleLogout()" class="text-sm text-slate-500 hover:text-red-500">
                <i class="fa-solid fa-right-from-bracket mr-1"></i> 로그아웃
            </button>
        </nav>

        <div class="max-w-6xl mx-auto px-4 mt-8">
            <!-- Header Section -->
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                <div>
                    <h2 id="current-month-display" class="text-3xl font-extrabold text-slate-900">2024년 5월</h2>
                    <p class="text-slate-500">당신의 꾸준함이 근육을 만듭니다.</p>
                </div>
                <div class="flex items-center bg-white rounded-xl shadow-sm border border-slate-200 p-1">
                    <button onclick="changeMonth(-1)" class="px-4 py-2 hover:bg-slate-50 rounded-lg"><i class="fa-solid fa-chevron-left"></i></button>
                    <button onclick="goToToday()" class="px-6 py-2 font-medium text-blue-600 hover:bg-blue-50 rounded-lg mx-1">오늘</button>
                    <button onclick="changeMonth(1)" class="px-4 py-2 hover:bg-slate-50 rounded-lg"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
            </div>

            <!-- Calendar Section -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="calendar-grid border-b border-slate-200 bg-slate-50">
                    <div class="py-3 text-center text-xs font-bold text-slate-400 uppercase tracking-wider">일</div>
                    <div class="py-3 text-center text-xs font-bold text-slate-400 uppercase tracking-wider">월</div>
                    <div class="py-3 text-center text-xs font-bold text-slate-400 uppercase tracking-wider">화</div>
                    <div class="py-3 text-center text-xs font-bold text-slate-400 uppercase tracking-wider">수</div>
                    <div class="py-3 text-center text-xs font-bold text-slate-400 uppercase tracking-wider">목</div>
                    <div class="py-3 text-center text-xs font-bold text-slate-400 uppercase tracking-wider">금</div>
                    <div class="py-3 text-center text-xs font-bold text-slate-400 uppercase tracking-wider">토</div>
                </div>
                <div id="calendar-body" class="calendar-grid">
                    <!-- Days will be generated here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Workout Entry Modal -->
    <div id="modal-overlay" class="fixed inset-0 z-40 hidden flex items-center justify-center bg-black bg-opacity-40">
        <div class="bg-white p-6 rounded-2xl shadow-2xl w-full max-w-sm mx-4 transform transition-all">
            <h3 id="modal-date" class="text-xl font-bold mb-4">2024년 5월 1일 기록</h3>
            <div class="space-y-4">
                <div class="flex items-center justify-between p-3 bg-blue-50 rounded-xl">
                    <span class="flex items-center gap-2 font-medium"><i class="fa-solid fa-person-pushup text-blue-600"></i> 팔굽혀펴기 50회</span>
                    <input type="checkbox" id="check-pushup" class="w-6 h-6 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                </div>
                <div class="flex items-center justify-between p-3 bg-orange-50 rounded-xl">
                    <span class="flex items-center gap-2 font-medium"><i class="fa-solid fa-stairs text-orange-600"></i> 계단 오르기</span>
                    <input type="checkbox" id="check-stairs" class="w-6 h-6 rounded border-slate-300 text-orange-600 focus:ring-orange-500">
                </div>
                <div class="flex items-center justify-between p-3 bg-green-50 rounded-xl">
                    <span class="flex items-center gap-2 font-medium"><i class="fa-solid fa-person-running text-green-600"></i> 러닝 5km</span>
                    <input type="checkbox" id="check-running" class="w-6 h-6 rounded border-slate-300 text-green-600 focus:ring-green-500">
                </div>
                <div class="flex items-center justify-between p-3 bg-purple-50 rounded-xl">
                    <span class="flex items-center gap-2 font-medium"><i class="fa-solid fa-person-falling text-purple-600"></i> 스쿼트 50회</span>
                    <input type="checkbox" id="check-squat" class="w-6 h-6 rounded border-slate-300 text-purple-600 focus:ring-purple-500">
                </div>
            </div>
            <div class="mt-6 flex gap-2">
                <button onclick="closeModal()" class="flex-1 px-4 py-2 border border-slate-200 rounded-lg hover:bg-slate-50 transition">취소</button>
                <button onclick="saveRecord()" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-bold">저장</button>
            </div>
        </div>
    </div>

    <script>
        // State Management
        let currentYear, currentMonth;
        let records = JSON.parse(localStorage.getItem('workout_records')) || {};
        let activeDate = null;

        // Auth Logic
        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('login-error');

            if (user === 'user' && pass === 'password') {
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                initCalendar();
            } else {
                error.classList.remove('hidden');
            }
        }

        function handleLogout() {
            location.reload();
        }

        // Calendar Logic
        function initCalendar() {
            const now = new Date();
            currentYear = now.getFullYear();
            currentMonth = now.getMonth();
            renderCalendar();
        }

        function renderCalendar() {
            const body = document.getElementById('calendar-body');
            const display = document.getElementById('current-month-display');
            body.innerHTML = '';
            
            display.innerText = `${currentYear}년 ${currentMonth + 1}월`;

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            // Previous month empty slots
            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'calendar-day border border-slate-100 bg-slate-50 bg-opacity-50';
                body.appendChild(empty);
            }

            // Current month days
            const today = new Date();
            for (let day = 1; day <= daysInMonth; day++) {
                const dateKey = `${currentYear}-${currentMonth + 1}-${day}`;
                const dayRecord = records[dateKey] || [];
                const isToday = today.getFullYear() === currentYear && today.getMonth() === currentMonth && today.getDate() === day;

                const dayEl = document.createElement('div');
                dayEl.className = `calendar-day border border-slate-100 p-2 cursor-pointer flex flex-col items-start gap-1 ${isToday ? 'bg-blue-50 ring-1 ring-inset ring-blue-200' : 'bg-white'}`;
                dayEl.onclick = () => openModal(currentYear, currentMonth, day);

                const dayNum = document.createElement('span');
                dayNum.className = `text-sm font-bold ${isToday ? 'text-blue-600' : 'text-slate-500'}`;
                dayNum.innerText = day;
                dayEl.appendChild(dayNum);

                // Add indicators for workouts done
                const indicators = document.createElement('div');
                indicators.className = 'flex flex-wrap gap-1 mt-1';
                
                if (dayRecord.includes('pushup')) indicators.innerHTML += `<div class="w-2 h-2 rounded-full bg-blue-500" title="팔굽혀펴기"></div>`;
                if (dayRecord.includes('stairs')) indicators.innerHTML += `<div class="w-2 h-2 rounded-full bg-orange-500" title="계단오르기"></div>`;
                if (dayRecord.includes('running')) indicators.innerHTML += `<div class="w-2 h-2 rounded-full bg-green-500" title="러닝"></div>`;
                if (dayRecord.includes('squat')) indicators.innerHTML += `<div class="w-2 h-2 rounded-full bg-purple-500" title="스쿼트"></div>`;
                
                dayEl.appendChild(indicators);

                // Show mini icons if all done
                if (dayRecord.length === 4) {
                    const checkMark = document.createElement('div');
                    checkMark.className = 'mt-auto self-end text-green-500 text-xs font-bold flex items-center gap-1';
                    checkMark.innerHTML = '<i class="fa-solid fa-circle-check"></i> 완료';
                    dayEl.appendChild(checkMark);
                }

                body.appendChild(dayEl);
            }
        }

        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            } else if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            renderCalendar();
        }

        function goToToday() {
            const now = new Date();
            currentYear = now.getFullYear();
            currentMonth = now.getMonth();
            renderCalendar();
        }

        // Modal Logic
        function openModal(year, month, day) {
            activeDate = `${year}-${month + 1}-${day}`;
            const record = records[activeDate] || [];
            
            document.getElementById('modal-date').innerText = `${year}년 ${month + 1}월 ${day}일 기록`;
            document.getElementById('check-pushup').checked = record.includes('pushup');
            document.getElementById('check-stairs').checked = record.includes('stairs');
            document.getElementById('check-running').checked = record.includes('running');
            document.getElementById('check-squat').checked = record.includes('squat');
            
            document.getElementById('modal-overlay').classList.remove('hidden');
            document.getElementById('modal-overlay').classList.add('flex');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.add('hidden');
            document.getElementById('modal-overlay').classList.remove('flex');
        }

        function saveRecord() {
            const checkedWorkouts = [];
            if (document.getElementById('check-pushup').checked) checkedWorkouts.push('pushup');
            if (document.getElementById('check-stairs').checked) checkedWorkouts.push('stairs');
            if (document.getElementById('check-running').checked) checkedWorkouts.push('running');
            if (document.getElementById('check-squat').checked) checkedWorkouts.push('squat');

            if (checkedWorkouts.length > 0) {
                records[activeDate] = checkedWorkouts;
            } else {
                delete records[activeDate];
            }

            localStorage.setItem('workout_records', JSON.stringify(records));
            closeModal();
            renderCalendar();
        }

        // Handle Enter key for login
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !document.getElementById('login-overlay').classList.contains('hidden')) {
                handleLogin();
            }
        });
    </script>
</body>
</html>
